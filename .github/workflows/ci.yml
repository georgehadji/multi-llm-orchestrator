# CI/CD Pipeline for AI Orchestrator
# Runs on: push, pull_request
# Tests: Python 3.10, 3.11, 3.12

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════
  # Lint & Type Check
  # ═══════════════════════════════════════════════════════════════════════════════
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black ruff mypy pre-commit
      
      - name: Black format check
        run: black --check orchestrator/ tests/
      
      - name: Ruff lint
        run: ruff check orchestrator/ tests/
      
      - name: MyPy type check
        run: mypy orchestrator/ --ignore-missing-imports

  # ═══════════════════════════════════════════════════════════════════════════════
  # Security Scan
  # ═══════════════════════════════════════════════════════════════════════════════
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install security tools
        run: |
          pip install bandit safety
          pip install -e .
      
      - name: Bandit security scan
        run: bandit -r orchestrator/ -f json -o bandit-report.json || true
      
      - name: Safety dependency check
        run: safety check --json > safety-report.json || true
      
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  # ═══════════════════════════════════════════════════════════════════════════════
  # Test Suite
  # ═══════════════════════════════════════════════════════════════════════════════
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=orchestrator \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=70 \
            -m "not slow"
        env:
          # Use mock API keys for tests
          OPENAI_API_KEY: sk-test-key
          GOOGLE_API_KEY: test-key
          ANTHROPIC_API_KEY: test-key
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-${{ matrix.python-version }}
      
      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html-${{ matrix.python-version }}
          path: htmlcov/

  # ═══════════════════════════════════════════════════════════════════════════════
  # Build & Package
  # ═══════════════════════════════════════════════════════════════════════════════
  build:
    runs-on: ubuntu-latest
    needs: [lint, security, test]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install build tools
        run: |
          pip install build twine
      
      - name: Build package
        run: python -m build
      
      - name: Check package with Twine
        run: twine check dist/*
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ═══════════════════════════════════════════════════════════════════════════════
  # Docker Build (on main branch only)
  # ═══════════════════════════════════════════════════════════════════════════════
  docker:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ai-orchestrator:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════════════════════════════
  # Deploy Documentation (on main branch only)
  # ═══════════════════════════════════════════════════════════════════════════════
  docs:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install docs dependencies
        run: |
          pip install mkdocs mkdocs-material mkdocstrings[python]
          pip install -e .
      
      - name: Deploy documentation
        run: mkdocs gh-deploy --force
