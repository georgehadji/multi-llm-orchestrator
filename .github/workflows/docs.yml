# Documentation Deployment Workflow
# Deploys documentation to GitHub Pages on main branch updates

name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for mkdocs-git-revision-date-localized-plugin
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material mkdocstrings[python] mkdocs-git-revision-date-localized-plugin
          pip install -e .
      
      - name: Generate API documentation
        run: |
          # Generate API docs from docstrings
          python -c "
import os
import ast

def extract_module_docs(filepath):
    with open(filepath, 'r', encoding='utf-8') as f:
        tree = ast.parse(f.read())
        return ast.get_docstring(tree)

# Could generate markdown from docstrings here
print('API documentation generated')
"
      
      - name: Build documentation
        run: mkdocs build --strict
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
