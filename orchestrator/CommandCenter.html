<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Orchestrator Command Center</title>
  <style>
    /* Inline critical CSS for instant render */
    :root {
      --color-bg-primary: #0f172a;
      --color-text-primary: #f8fafc;
    }
    body {
      margin: 0;
      background-color: var(--color-bg-primary);
      color: var(--color-text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
    }
    #loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
  <link rel="stylesheet" href="CommandCenter.css">
</head>
<body>
  <div id="root">
    <div id="loading">Initializing Command Center...</div>
  </div>
  
  <!-- React and ReactDOM from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Dashboard Component -->
  <script type="text/babel" src="CommandCenter.jsx"></script>
  
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CommandCenter />);
  </script>
</body>
</html>
