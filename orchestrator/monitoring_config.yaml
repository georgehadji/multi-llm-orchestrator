# Monitoring Triggers Configuration
# ==================================
# Defines alerting thresholds and automated responses for the orchestrator.
# These triggers help detect and respond to anomalies in real-time.

alerting:
  # Cost anomaly detection
  cost_anomaly:
    condition: "project_cost > 2.5 * estimated_cost"
    severity: "warning"
    action: 
      - "log_warning"
      - "freeze_policy_updates"
    auto_escalate: true
    cooldown_minutes: 30

  # Quality regression detection  
  quality_regression:
    condition: "avg_score < 0.75 for 10 consecutive tasks"
    severity: "critical"
    action:
      - "revert_to_baseline_routing"
      - "notify_team"
      - "enable_detailed_logging"
    auto_escalate: true
    cooldown_minutes: 15

  # Drift detection in model performance
  drift_detected:
    condition: "trust_factor_variance > 0.3 across models"
    severity: "warning"
    action:
      - "trigger_telemetry_audit"
      - "partial_reset_warm_models"
      - "increase_monitoring_frequency"
    auto_escalate: false
    cooldown_minutes: 60

  # Silent failure detection
  silent_failure:
    condition: "task_completes with score=0.0 AND no error logged"
    severity: "critical"
    action:
      - "escalate_to_manual_review"
      - "add_instrumentation"
      - "alert_oncall"
    auto_escalate: true
    cooldown_minutes: 5

  # Circuit breaker activation
  circuit_breaker_triggered:
    condition: "model_marked_unhealthy"
    severity: "info"
    action:
      - "log_circuit_event"
      - "notify_if_premium_model"
    auto_escalate: false
    cooldown_minutes: 0

  # Cache efficiency monitoring
  cache_efficiency:
    condition: "semantic_cache_hit_rate < 0.10 for 1 hour"
    severity: "info"
    action:
      - "log_cache_stats"
      - "adjust_quality_threshold_if_needed"
    auto_escalate: false
    cooldown_minutes: 60

  # Tier escalation monitoring
  tier_escalation_spike:
    condition: "tier_escalation_rate > 0.30 for 30 minutes"
    severity: "warning"
    action:
      - "review_cheap_tier_health"
      - "adjust_tier_thresholds"
    auto_escalate: false
    cooldown_minutes: 30

  # Budget exhaustion approaching
  budget_warning:
    condition: "budget_remaining < 0.20 * initial_budget"
    severity: "warning"
    action:
      - "log_budget_status"
      - "notify_if_critical_project"
    auto_escalate: false
    cooldown_minutes: 10

# Automated responses
responses:
  revert_to_baseline_routing:
    description: "Disable tiered selection, use static ROUTING_TABLE"
    duration_minutes: 60
    
  freeze_policy_updates:
    description: "Prevent policy changes until investigation"
    duration_minutes: 30
    
  partial_reset_warm_models:
    description: "Reset models with < 50 calls to default profiles"
    preserve_hot_models: true
    
  increase_monitoring_frequency:
    description: "Double telemetry collection rate"
    duration_minutes: 30

# Notification channels
notifications:
  team:
    channels: ["slack", "email"]
    min_severity: "warning"
    
  oncall:
    channels: ["pagerduty", "sms"]
    min_severity: "critical"
    
  log_only:
    channels: ["file"]
    min_severity: "info"
