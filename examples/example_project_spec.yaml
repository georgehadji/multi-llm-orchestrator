# Project Specification Template
# Save this file and upload via the "YAML Spec" tab

# Required: Project name
name: "My Awesome Project"

# Required: Detailed description of what to build
description: |
  Describe your project here in detail.
  What problem does it solve?
  Who are the users?
  What are the main features?

# Optional: Technology stack
tech_stack:
  - "Python with FastAPI"
  - "PostgreSQL database"
  - "React frontend"
  - "Docker for deployment"

# Optional: List of requirements
requirements:
  - "User registration and login"
  - "CRUD operations for main entities"
  - "RESTful API with documentation"
  - "Unit tests with pytest"

# Optional: Key features
features:
  - "Authentication system"
  - "Admin dashboard"
  - "Data export"
  - "Email notifications"

# Optional: Architecture notes
architecture:
  - "Clean architecture"
  - "Repository pattern"
  - "Dependency injection"

# Optional: Success criteria for completion
success_criteria: |
  - All API endpoints return correct responses
  - Tests achieve 80%+ code coverage
  - Documentation is complete
  - Docker setup works correctly

# Optional: Budget limit in USD (can be overridden in UI)
budget_usd: 5.0
