id: "awwwards_optimized_ultra_webgl_v1"

# ──────────────────────────────────────────────────────
# Awwwards Optimized Cinematic WebGL Experience
# Target: Honorable Mention / Site of the Day readiness
# Stack: React 18, TypeScript, Three.js, R3F, GLSL, GSAP, Web Audio API
# ──────────────────────────────────────────────────────

project: |
  Build an award-caliber immersive WebGL experience for a techno DJ / producer.

  The experience must balance:
    cinematic impact
    usability clarity
    performance stability
    narrative flow
    strong typographic identity

  This is not just visual spectacle.
  It must feel intentional, curated, and controlled.

  ─────────────────────────
  1. Narrative Structure (Critical for Awwwards)
  ─────────────────────────

  The experience must follow a clear narrative arc:

    INTRO — cinematic build
    IMMERSION — spatial exploration
    IDENTITY — brand clarity
    MUSIC — audio interaction
    LIVE — performance credibility
    CLOSING — minimal, powerful CTA

  Each phase must have visual distinction.

  No visual chaos.
  No excessive effect stacking.

  ─────────────────────────
  2. Cinematic Intro (8–12 seconds)
  ─────────────────────────

  Sequence:

  - total darkness
  - subtle particle flicker
  - volumetric light fade-in
  - forward camera drift
  - logo reveal via shader dissolve
  - subtle bass hit sync
  - transition into interactive mode

  Controlled by GSAP master timeline.

  Must feel like short film opening.

  ─────────────────────────
  3. Visual System Rules
  ─────────────────────────

  Color system:
    background: near black
    primary: white
    accent: electric cyan
    secondary accent: magenta

  Use accent color sparingly.

  Motion rules:
    everything eased
    no sudden camera snaps
    no default Three.js camera feel

  Typography:
    large, confident headings
    minimal copy
    strong spacing rhythm

  ─────────────────────────
  4. Creativity Score Optimization
  ─────────────────────────

  Implement at least two signature techniques:

  A. Procedural particle tunnel with domain-warp noise
  B. Volumetric light reacting to bass frequencies
  C. Particle-based logo assembly
  D. Audio-reactive mesh distortion

  Must feel custom, not template-based.

  ─────────────────────────
  5. Usability Score Optimization
  ─────────────────────────

  Even with WebGL, navigation must be intuitive.

  Requirements:

  - visible minimal navigation overlay
  - skip intro option
  - mute audio option
  - scroll indicator
  - mobile fallback static version

  Ensure user is never confused.

  ─────────────────────────
  6. Performance Score Optimization
  ─────────────────────────

  Target:

    ≥60 FPS desktop
    ≥40 FPS high-end laptop
    ≥30 FPS mobile fallback mode

  Techniques:

  - InstancedMesh
  - adaptive DPR
  - dynamic effect quality scaling
  - lazy scene mounting
  - avoid heavy CPU loops
  - minimal re-renders in React

  Must include PerformanceManager module.

  ─────────────────────────
  7. Content Score Optimization
  ─────────────────────────

  Include realistic DJ content:

  - 3 featured releases
  - 5 past live events
  - short artistic statement
  - social media links
  - press quote

  Avoid placeholder lorem ipsum.

  Content must feel intentional and branded.

  ─────────────────────────
  8. Motion Score Optimization
  ─────────────────────────

  All transitions orchestrated via:

  GSAP master timeline

  CameraRig must:

  - simulate real-world inertia
  - include subtle handheld micro motion
  - support scroll depth transitions

  Add micro-interactions:

  - hover glow
  - distortion ripple
  - subtle text reveal animations

  ─────────────────────────
  9. Sound Design Integration
  ─────────────────────────

  Audio must not autoplay without permission.

  Use click-to-activate model.

  Audio influences:

  particle intensity
  light brightness
  shader displacement

  Audio response must feel controlled, not chaotic.

  ─────────────────────────
  10. Technical Architecture
  ─────────────────────────

  src/
    engine/
    shaders/
    audio/
    scenes/
    postprocessing/
    experience/
    ui/

  Modular.
  Clean separation of concerns.
  No spaghetti code.

  ─────────────────────────
  11. Accessibility Considerations
  ─────────────────────────

  Provide:

  - reduced motion mode
  - static fallback mode
  - keyboard navigation
  - high contrast text

  Awwwards judges notice accessibility maturity.

  ─────────────────────────
  Deliver:
  ─────────────────────────

  Complete production-ready project.

  Includes:
  - full source code
  - shader files
  - postprocessing setup
  - audio engine
  - cinematic intro
  - performance manager
  - realistic content
  - mobile fallback mode

criteria: |
  - Cinematic intro runs smoothly
  - Navigation intuitive
  - Audio reactive visuals function correctly
  - Performance targets met
  - No TypeScript errors
  - No memory leaks
  - Clean architecture
  - Visually cohesive design
  - Judges can understand project intent within 10 seconds

output_dir: "./outputs/awwwards_ultra_webgl"

project_id: "awwwards-optimized-ultra-webgl-v1"

quality_targets:
  code_generation:   0.98
  code_review:       0.94
  complex_reasoning: 0.97
  evaluation:        0.93

time_seconds: 18000
concurrency: 3

policies:
  - name: no_training
    allow_training_on_output: false