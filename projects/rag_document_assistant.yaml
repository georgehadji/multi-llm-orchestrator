project: |
  Build a production-style Retrieval Augmented Generation (RAG) system
  that answers questions using a private document knowledge base.

  The system must ingest documents, build embeddings, store them in a
  vector database, retrieve relevant chunks, and generate answers
  using an LLM with citations.

  1. DOCUMENT INGESTION
     Supported document types:
     - PDF
     - Markdown
     - TXT
     - HTML

     Pipeline:
     - Load documents using LangChain or LlamaIndex loaders
     - Clean text
     - Split documents into chunks (500–800 tokens)
     - Store metadata:
         * document name
         * section
         * page number
         * source path

  2. EMBEDDING GENERATION
     Generate embeddings using one of:

     - OpenAI text-embedding-3-large
     - BGE-large
     - InstructorXL
     - E5-large

     Store embeddings in vector database.

  3. VECTOR DATABASE
     Use one of:

     - Chroma
     - Weaviate
     - Qdrant
     - FAISS

     Store:
     - embeddings
     - chunk text
     - metadata

  4. RETRIEVAL PIPELINE

     Query pipeline:

     User question
        ↓
     Query embedding
        ↓
     Vector search (top-k = 5)
        ↓
     Reranking step (optional)
        ↓
     Context assembly
        ↓
     LLM answer generation

     Retrieval strategies:

     - similarity search
     - Max Marginal Relevance (MMR)
     - hybrid search (BM25 + vector)

  5. GENERATION LAYER

     Use LLM for answer synthesis:

     Possible models:

     - GPT-4 / GPT-4o
     - Claude
     - local LLM (Llama-3 / Mixtral)

     Prompt must include:

     - retrieved context
     - instruction to cite sources
     - instruction to say "insufficient information"
       if answer not in documents.

  6. EVALUATION PIPELINE

     Evaluate RAG performance using:

     - Retrieval recall@k
     - Answer relevance
     - Faithfulness (hallucination detection)

     Use tools such as:

     - Ragas
     - DeepEval
     - custom evaluation scripts

  7. USER INTERFACE

     Provide simple UI:

     Option A:
       Streamlit app

     Option B:
       FastAPI backend + simple web frontend

     UI must include:

     - question input
     - answer output
     - cited sources
     - retrieved context viewer

  8. ADVANCED FEATURES (OPTIONAL)

     - query rewriting
     - multi-query retrieval
     - conversational memory
     - document filtering by metadata
     - reranker (cross-encoder)

  Use libraries:

  - langchain
  - llama-index
  - sentence-transformers
  - chromadb / qdrant-client
  - fastapi
  - streamlit
  - ragas
  - pydantic
  - tiktoken
  - numpy
  - pandas


criteria: |
  - At least 50 documents successfully ingested
  - Vector database contains ≥ 1000 chunks
  - Retrieval returns relevant context in top-5 results
  - Generated answers contain citations referencing documents
  - Evaluation pipeline reports:
        answer relevance ≥ 0.75
        faithfulness ≥ 0.80
  - System handles queries not present in knowledge base
    by returning "insufficient information"
  - UI allows interactive querying
  - Codebase includes README explaining architecture


budget_usd: 4.0
time_seconds: 5400
concurrency: 3

project_id: "rag-document-assistant-v1"

output_dir: "./outputs/rag_document_assistant"


quality_targets:
  code_generation:   0.90
  code_review:       0.88
  complex_reasoning: 0.92
  evaluation:        0.90


policies:
  - name: no_training
    allow_training_on_output: false