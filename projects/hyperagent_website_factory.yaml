  TOKEN OPTIMIZATION:
  ===================
  Strategies for minimal token consumption without quality loss:
  
  PROMPT COMPRESSION:
    - Context pruning: Remove irrelevant history (keep last 10 turns)
    - Summary compression: Summarize old conversations (5:1 ratio)
    - Template variables: Use placeholders for repeated content
    - System prompt optimization: Minimal, focused instructions
    - Target: 40% reduction in prompt tokens
  
  CONTEXT MANAGEMENT:
    - Sliding window: Keep only relevant context (last N messages)
    - Hierarchical context: Summary → Details (load on demand)
    - Reference by ID: Store full content, reference by hash
    - Lazy loading: Fetch full context only when needed
    - Target: 50% reduction in context tokens
  
  RESPONSE OPTIMIZATION:
    - Structured output: JSON schemas (no verbose explanations)
    - Token limits: Enforce max tokens per task type
    - Streaming: Process partial responses immediately
    - Truncation detection: Alert if response cut off
    - Target: 30% reduction in completion tokens
  
  MODEL SELECTION:
    - Task-model matching: Right model for each task size
    - Small tasks → Small models (Gemini Flash, Phi-4)
    - Complex tasks → Large models (Claude, Grok 4.1 Fast)
    - Fallback cascade: Try cheap first, escalate on failure
    - Target: 35% cost reduction via optimal model selection
  
  CACHING BENEFITS:
    - Cache hit = 100% token savings for that request
    - Target overall: 45% token reduction via caching
    - Combined target: 60% total token reduction
  
  TOKEN BUDGETS (per agent, per task):
    - Hyperagent: 8K input / 4K output (coordination tasks)
    - Frontend: 16K input / 8K output (code generation)
    - Backend: 16K input / 8K output (API design)
    - Design: 8K input / 4K output (design tokens)
    - Copywriting: 8K input / 4K output (content creation)
    - Security: 16K input / 8K output (security analysis + middleware)
    - SEO: 8K input / 4K output (meta tags, structured data)
    - Image: 4K input / 2K output (prompt + manifest generation)
    - Debugging: 32K input / 8K output (code review)
    - Git: 8K input / 4K output (configs, templates, workflows)
    - Memory ops: 4K input / 2K output (embeddings)

