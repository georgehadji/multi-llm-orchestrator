project: |
  Build a Hyperagent Website Factory - a cost-efficient, modular, self-improving multi-agent orchestration system where a supervising Hyperagent coordinates 9 specialized senior-level agents to build complete websites.

  DESIGN PRINCIPLES:
  ==================
  COST-EFFICIENCY FIRST:
    - Model cascading: Try cheapest capable model first, escalate only on failure
    - Task-model matching: Right model size for each task complexity
    - Aggressive caching: 3-layer cache with 60%+ hit rate target
    - Token optimization: Prompt compression, context pruning, structured outputs
    - Dynamic routing: Route to cheapest available model meeting quality threshold
    - Cost monitoring: Real-time cost tracking with budget alerts
    - Fallback economics: Cheaper fallbacks preferred over premium models
  
  PARALLELIZATION FIRST:
    - Task decomposition: Break work into independent units for parallel execution
    - Agent concurrency: All 9 agents can work simultaneously on independent tasks
    - Pipeline parallelism: Overlap stages (fetch → process → review → finalize)
    - Data parallelism: Process multiple files/components in parallel batches
    - Model parallelism: Multiple LLM calls in parallel (up to concurrency limit)
    - I/O overlap: Async I/O for all network/disk operations
    - Lock-free design: Minimize contention points, use lock-free data structures
    - Work stealing: Idle agents can pick up tasks from busy agents' queues
    - Batch processing: Group similar operations for vectorized execution
    - Speculative execution: Run multiple model responses in parallel, take best
  
  MODULARITY FIRST:
    - Loose coupling: Agents communicate via message queue only (no direct calls)
    - Clear interfaces: Abstract base classes define agent contracts
    - Plugin architecture: Agents are hot-swappable plugins
    - Dependency injection: All dependencies injected, never hardcoded
    - Configuration-driven: Behavior controlled via YAML config
    - Microservices-ready: Each agent can run as separate process/service
    - Single responsibility: Each module has one reason to change

  USER INTERACTION MODEL:
  =======================
  - User interacts ONLY with the Hyperagent (single interface)
  - Hyperagent gathers requirements through conversational dialogue
  - User never directly communicates with specialized agents
  - Hyperagent translates user intent into agent tasks
  - Hyperagent presents unified progress updates to user
  - User feedback goes to Hyperagent, which orchestrates revisions

  AGENT PHILOSOPHY:
  =================
  - Each agent has ONE specialty only (focused expertise)
  - All agents are SENIOR-level (10+ years equivalent expertise)
  - Agents use cost-optimized model selection (cheapest capable model)
  - No overlap in responsibilities between agents
  - Clear handoff protocols between agents
  - Agents are modular plugins (hot-swappable)
  
  ARCHITECTURE DECISION FRAMEWORK:
  ==================================
  Hyperagent selects optimal architecture and paradigm per module:
  
  ARCHITECTURE PATTERNS (Hyperagent evaluates and selects):
    - Monolithic: Single deployable unit (simple projects, < 10 pages)
    - Modular Monolith: Separated modules, single deployment (medium projects)
    - Microservices: Independent services (complex, high-scale projects)
    - Serverless: Function-based, event-driven (sporadic traffic, cost-sensitive)
    - JAMstack: Static generation + APIs (content sites, marketing pages)
    - Headless CMS: Decoupled content + frontend (multi-channel content)
  
  ARCHITECTURE SELECTION CRITERIA:
    - Project complexity: Simple (monolith) vs Complex (microservices)
    - Team size: Solo/small (monolith) vs Large (microservices)
    - Scale expectations: Low (monolith) vs High (microservices/serverless)
    - Budget constraints: Low (monolith/JAMstack) vs High (microservices)
    - Time to market: Fast (JAMstack/serverless) vs Flexible (monolith)
    - Maintenance capacity: Low (serverless/JAMstack) vs High (microservices)
  
  PROGRAMMING PARADIGMS (Per module selection):
    - Procedural: Simple scripts, utilities, build tools
    - Object-Oriented: Complex business logic, domain models, UI components
    - Functional: Data transformations, pipelines, stateless operations
    - Event-Driven: Real-time features, notifications, async workflows
    - Reactive: User interfaces, streaming data, live updates
    - Declarative: Configuration, UI layouts, database schemas
  
  PARADIGM SELECTION CRITERIA:
    - Data flow: Linear (procedural) vs Transform (functional) vs Event (event-driven)
    - State management: Mutable (OOP) vs Immutable (functional) vs External (reactive)
    - Complexity: Simple (procedural) vs Medium (OOP) vs Complex (functional/reactive)
    - Concurrency: Sequential (procedural/OOP) vs Parallel (functional) vs Async (reactive)
  
  MODULE-LEVEL DECISIONS:
    For each module, Hyperagent decides:
    1. Architecture pattern (from 6 options)
    2. Programming paradigm (from 6 options)
    3. Design patterns (Repository, Factory, Strategy, Observer, etc.)
    4. Communication style (REST, GraphQL, gRPC, WebSocket, Events)
    5. Data storage (SQL, NoSQL, In-Memory, File-based)
    6. Caching strategy (None, LRU, TTL, Write-through, Write-back)
  
  ARCHITECTURE DOCUMENTATION:
    - Architecture Decision Records (ADRs) for each significant decision
    - C4 diagrams: Context, Container, Component, Code
    - Data flow diagrams for critical paths
    - Sequence diagrams for complex interactions
    - Deployment diagrams for infrastructure
    - API documentation (OpenAPI/Swagger for REST, GraphQL schema)

