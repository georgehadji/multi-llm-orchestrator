  HEARTBEAT CRITERIA:
  - All 9 agents send heartbeat every 10 seconds
  - Heartbeat includes: agent_id, status, current_task, memory_usage, cpu_usage
  - Missed heartbeat detected within 30 seconds
  - Unhealthy agent marked within 60 seconds
  - Automatic agent restart within 180 seconds of failure
  - Health dashboard accessible at localhost:8080/health
  - Color-coded status (green/yellow/red) for all agents
  - Response time metrics updated in real-time
  - Token usage rate tracked (tokens/minute)
  - Cost burn rate tracked ($/hour)
  - Alert history retains last 100 events
  - Email alerts sent on critical failures
  - Windows toast notifications for errors
  - Heartbeat data retained for 24 hours
  
  CRON JOB CRITERIA:
  - Memory consolidation runs daily at 3:00 AM
  - Cache cleanup runs every 6 hours
  - Model performance sync runs hourly
  - Cost report generated daily at 11:59 PM
  - Log rotation runs daily at midnight
  - Checkpoint cleanup runs weekly (Sunday)
  - Learning model update runs weekly (Monday)
  - Security scan runs daily at 2:00 AM
  - Backup creation runs daily at 4:00 AM
  - Custom cron jobs support standard cron expressions
  - Job history tracks: status, duration, output
  - Job dependencies enforced (execution order)
  - Job notifications sent on completion/failure
  - Windows Task Scheduler integration working
  - Max 3 simultaneous jobs enforced
  - Job timeout (30 minutes) enforced
  - Job retry logic (3 retries, exponential backoff) working
  
  MEMORY CRITERIA:
  - Short-term memory uses deque with maxlen=20 (O(1) append/popleft)
  - Event log uses list with 10% cutoff eviction when max_size reached
  - Undo stack supports push/pop/peek operations (LIFO, O(1))
  - Task queue is async-safe with bounded maxsize for backpressure
  - Priority scheduler uses heapq with O(log n) insert/extract
  - State store provides O(1) average lookup for entity state
  - TTL memory auto-purges expired entries based on configurable TTL
  - Tagged memory supports multi-index categorization
  - Long-term memory persists to SQLite (survives restarts)
  - Vector store enables semantic similarity search (ChromaDB)
  - Memory hierarchy manages 5 layers (L1-L5) with automatic promotion/demotion
  - Memory consolidation transfers STM → LTM with compression
  - Memory retrieval returns relevant results in < 200ms
  - All memory classes are type-safe with proper generics
  - Memory operations are thread-safe where required
  - Memory eviction policies prevent unbounded growth
  
  COMMUNICATION CRITERIA:
  - SQLite message queue handles 1000+ messages/second
  - All 7 message types implemented (TASK_REQUEST, TASK_COMPLETE, DATA_SHARE, BLOCKING_ISSUE, HANDOFF, BROADCAST, CONFLICT_RESOLUTION)
  - At-least-once delivery guaranteed (automatic retry on failure)
  - Message acknowledgment (ACK/NACK) working
  - Dead letter queue captures failed messages after 3 retries
  - Message TTL enforced (1 hour expiration)
  - Named Pipes provide < 1ms latency for urgent messages
  - Named Pipes handle: emergency stop, health pings, sync request/response
  - JSON file messaging works for async communication
  - Message routing delivers to correct recipient agent
  - Subscription system filters messages by topic
  - FIFO ordering maintained per agent pair
  - Duplicate detection prevents message reprocessing
  - Backpressure throttling activates when queue depth > 1000
  - Inter-agent handoffs complete within 5 seconds
  - Broadcast messages reach all subscribed agents
  - Conflict resolution messages routed to Hyperagent
  - Message persistence survives process restart
  
  PARALLELIZATION CRITERIA:
  - ProcessPoolExecutor created with CPU_count + 4 workers (minimum 8)
  - ThreadPoolExecutor created with 32 workers for I/O operations
  - AsyncIO event loop handles 50+ concurrent connections
  - Task decomposition creates minimum 3 parallel levels
  - Level 0 tasks (independent) run fully in parallel
  - Work stealing enabled: idle workers pick up tasks from busy queues
  - Lock-free ConcurrentQueue used for inter-agent messaging
  - Batch processing groups operations (batch size 10 default)
  - Speculative execution runs 2 model variants for critical tasks
  - All network calls are async (non-blocking)
  - Connection pooling enabled for HTTP (reuse connections)
  - Parallel efficiency ≥ 70% with 14 workers
  - Load balance imbalance ≤ 10% (stddev/mean)
  - Throughput ≥ 5 tasks/second sustained
  - Pipeline parallelism overlaps: generate → review → fix → validate
  - All 9 agents can execute simultaneously on independent tasks
  - Critical path identified and prioritized
  - Barrier synchronization at quality gate checkpoints

  COST-EFFICIENCY CRITERIA:
  - Model cascading implemented (Free → Budget → Balanced → Premium tiers)
  - Task complexity scoring routes to cheapest capable model
  - FREE models (Qwen3.6, Nemotron, GLM-4.5-Air, Qwen3-Coder, Step-Flash) used for 80%+ of tasks
  - Budget models (Grok 4.1 Fast $0.20/$0.50, DeepSeek V3.2 $0.26/$0.38) used for specialized critical tasks
  - Claude Sonnet 4.6 ($3/$15) used for < 10% of tasks (complex only)
  - Cache hit rate ≥ 60% (combined L1+L2+L3)
  - Token optimization achieves 60% reduction vs baseline
  - Cost per website ≤ $5.00 (with optimizations; target $2.30 with FREE tier)
  - 77% cost reduction vs premium-only approach
  - Per-agent budget caps enforced
  - Cost alerts trigger at 80% of budget threshold
  - Batch operations group similar prompts for discounts
  - Model warm-up keeps budget models ready, premium cold
  - Success rate tracked per model, avoid < 80% success models
  
  MODULARITY CRITERIA:
  - All 9 agents implement AgentInterface abstract base class
  - Agents communicate ONLY via message queue (no direct calls)
  - Dependency injection used for all agent dependencies
  - Plugin manager supports hot-swap of agents without restart
  - Agent registry discovers and registers agents dynamically
  - All interfaces defined in interfaces/ module
  - Memory backends implement MemoryInterface (swappable)
  - Cache backends implement CacheInterface (swappable)
  - Model providers implement ModelInterface (swappable)
  - Configuration-driven behavior (YAML controls all settings)
  - Feature flags enable/disable functionality without code changes
  - Each module has single responsibility (SRP compliance)
  - Loose coupling: no module imports another module's internals
  - Microservices-ready: each agent can run as separate process
  - Plugin lifecycle: load, initialize, execute, shutdown hooks

