  MEMORY INFRASTRUCTURE:
  ======================
  Multi-layer memory system using optimal Python data structures:
  
  SHORT-TERM MEMORY (Working Memory):
    - collections.deque: Sliding window for last N messages (O(1) append/popleft)
    - Bounded capacity with automatic eviction (maxlen parameter)
    - Use: Conversation buffer, recent context, agent working state
    - Implementation: memory/short_term.py with ConversationBuffer class
  
  EVENT LOG (Append-Only History):
    - list: Dynamic array with amortized O(1) append, O(1) random access
    - Max size with 10% cutoff eviction when full
    - Timestamped events with type and data fields
    - Use: Agent action history, decision trail, audit log
    - Implementation: memory/event_log.py with EventLog class
  
  UNDO/BACKTRACKING:
    - list as LIFO stack: O(1) push/pop for undo operations
    - Type-safe with Generic[T] for different undoable actions
    - Use: Revert agent decisions, rollback failed operations
    - Implementation: memory/undo_stack.py with UndoStack class
  
  TASK PIPELINE:
    - asyncio.Queue: Async-safe FIFO for multi-agent task processing
    - Bounded maxsize for backpressure
    - Use: Inter-agent task distribution, event loop scheduling
    - Implementation: memory/task_queue.py with AsyncTaskQueue class
  
  PRIORITY SCHEDULING:
    - heapq (min-heap): O(log n) insert/extract for priority-based scheduling
    - dataclass with order=True for comparable tasks
    - Use: Urgent task prioritization, weighted memory retrieval
    - Implementation: memory/scheduler.py with AgentScheduler class
  
  KEYED STATE STORE:
    - defaultdict[str, dict]: O(1) average lookup for entity state
    - Nested dicts for user/session/topic metadata
    - Use: Agent state, user preferences, session context
    - Implementation: memory/state_store.py with EntityMemory class
  
  TTL MEMORY (Temporal Decay):
    - list[TimestampedEvent] + TTL-based purge
    - Automatic expiration with configurable time-to-live
    - Use: Temporal reasoning, "last N minutes" queries, decay-based forgetting
    - Implementation: memory/ttl_memory.py with TTLMemory class
  
  TAGGED MEMORY (Categorized):
    - defaultdict[str, list]: Multi-index by tags/categories
    - Use: Group memories by type (observations, decisions, errors)
    - Implementation: memory/tagged_memory.py with TaggedMemory class
  
  LONG-TERM MEMORY (Persistent):
    - SQLite: Structured storage survives restarts
    - ChromaDB: Vector embeddings for semantic similarity search
    - Use: Episodic memory, semantic knowledge, learned patterns
    - Implementation: memory/long_term.py with LongTermMemory class
  
  MEMORY HIERARCHY:
    L1 (Working): deque (maxlen=20) → Last 20 interactions
    L2 (Active): dict state + tagged lists → Current session
    L3 (Recent): SQLite (24h retention) → Last 24 hours
    L4 (Semantic): ChromaDB embeddings → Permanent knowledge
    L5 (Archival): SQLite summaries → Compressed history
  
  INTER-AGENT COMMUNICATION:
  ==========================
  Hybrid communication system for reliability and performance:
  
  PRIMARY: SQLite Message Queue (Recommended for Windows)
    - No external dependencies (uses existing SQLite)
    - Persistent messages (survives crashes)
    - Transaction-based (no race conditions)
    - Query-based routing (flexible filtering)
    - Tables:
      * messages (id, from_agent, to_agent, type, payload, status, created_at)
      * subscriptions (agent_id, topic, filter_pattern)
      * delivery_log (message_id, delivered_at, ack_status, retry_count)
      * dead_letter_queue (message_id, error_reason, failed_at)
    - Message Types:
      * TASK_REQUEST - Agent requests work/data from another agent
      * TASK_COMPLETE - Agent notifies task completion
      * DATA_SHARE - Agent shares output data/artifacts
      * BLOCKING_ISSUE - Urgent: requires immediate attention
      * HANDOFF - Transfer work to next agent in pipeline
      * BROADCAST - Message to all subscribed agents
      * CONFLICT_RESOLUTION - Request Hyperagent mediation
    - Delivery Guarantees:
      * At-least-once delivery (automatic retry)
      * Message acknowledgment (ACK/NACK responses)
      * Dead letter queue (after 3 failed deliveries)
      * Message TTL (expire after 1 hour if undelivered)
    - Performance: 1000+ messages/second
  
  SECONDARY: Windows Named Pipes (Real-time urgent)
    - Windows-native IPC (built-in OS support)
    - Lowest latency (< 1ms for urgent messages)
    - Full-duplex communication (bidirectional)
    - Use cases:
      * Emergency stop signals
      * Health check pings
      * Synchronous request/response
    - Pipe naming: \\.\pipe\hyperagent\{agent_id}
  
  TERTIARY: JSON Files (Async, audit trail)
    - File-based messaging for non-urgent communication
    - Automatic cleanup after processing
    - Human-readable (easy debugging)
    - Use cases:
      * Agent output artifacts
      * Handoff documentation
      * Audit trail logging
    - Directory structure: /messages/{agent_id}/outbox/, /inbox/
  
  MESSAGE PATTERNS:
    - Publish/Subscribe - Agents subscribe to topics
    - Point-to-Point - Direct agent-to-agent messaging
    - Request/Reply - Synchronous communication
    - Broadcast - One-to-many announcements
    - Pipeline - Sequential agent handoffs
  
  CONTENTION HANDLING:
    - Database locking: Optimistic locking with retry
    - Message ordering: FIFO per agent pair
    - Duplicate detection: Message ID deduplication
    - Backpressure: Queue depth monitoring + throttling
  
  CACHING INFRASTRUCTURE:
  =======================
  Multi-layer caching for maximum efficiency and cost reduction:
  
  L1 CACHE (In-Memory, Redis):
    - Agent response cache: Hash(prompt) → response (TTL: 1 hour)
    - Model output cache: Cache identical prompts across agents
    - Session cache: Active conversation context (TTL: 30 minutes)
    - Hit rate target: 40% for repeated patterns
  
  L2 CACHE (SQLite, Persistent):
    - Component library: Reusable UI components with metadata
    - Code snippet cache: Common patterns (auth, CRUD, forms)
    - Design token cache: Brand colors, typography combinations
    - Copy templates: Industry-specific content blocks
    - Hit rate target: 60% for common patterns
  
  L3 CACHE (Vector Store, Semantic):
    - Semantic similarity cache: Find similar past solutions
    - Embedding cache: Pre-computed prompt embeddings
    - Project pattern cache: Similar project structures
    - Hit rate target: 30% for novel queries
  
  CACHE STRATEGIES:
    - Write-through: Cache agent outputs immediately
    - Read-through: Check cache before LLM call
    - Cache invalidation: Invalidate on user feedback
    - Warm-up: Pre-load common patterns on startup
    - Eviction: LRU policy with priority for high-quality outputs

