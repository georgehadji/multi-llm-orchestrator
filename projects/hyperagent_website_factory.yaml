    - Input validation: Zod/Joi schemas on all endpoints
    - Error responses: Standardized format {error, message, code, details}
    - Logging: Structured JSON logs with correlation IDs
  
  SECURITY CODE QUALITY:
    - CSP headers: default-src 'self', script-src 'self' 'unsafe-inline'
    - All security headers present (X-Frame-Options, HSTS, X-Content-Type-Options)
    - Password hashing: bcrypt with cost factor ≥ 12
    - Session cookies: httpOnly, secure, sameSite=strict
    - CORS: Explicit whitelist (no wildcards for credentials)
    - CSRF tokens: On all state-changing forms
    - SQL injection: 100% parameterized queries (verified by scanner)
    - XSS prevention: Output encoding on all user-generated content
    - Secrets: Zero secrets in code (all via environment variables)
  
  SEO CODE QUALITY:
    - Title tags: Unique per page, < 60 characters, keyword-optimized
    - Meta descriptions: Unique per page, < 160 characters, compelling
    - Header hierarchy: One H1 per page, logical H2/H3 structure
    - Schema.org JSON-LD: Organization, WebSite, BreadcrumbList
    - Open Graph: Complete og:title, og:description, og:image, og:url
    - Twitter Cards: twitter:card, twitter:title, twitter:description
    - sitemap.xml: All pages included, valid XML, < 50MB
    - robots.txt: Valid syntax, allows crawling of public pages
    - Canonical URLs: Set on all pages (self-referencing)
    - Image alt text: Descriptive alt on all images
  
  GIT/DEVOPS CODE QUALITY:
    - .gitignore: Comprehensive (Node.js, Python, IDE, OS, env)
    - Branch protection: main requires 1 reviewer, status checks pass
    - CI/CD: Build, test, lint on every PR
    - Pre-commit hooks: ESLint, Prettier, type-check on commit
    - Conventional Commits: 100% compliance (feat:, fix:, chore:, etc.)
    - Semantic versioning: Tags follow semver (vMAJOR.MINOR.PATCH)
  
  PRODUCTION-GRADE REQUIREMENTS:
    - Zero hardcoded secrets (all via environment variables)
    - Health check endpoints on all services (/health, /ready, /live)
    - Structured logging (JSON format, correlation IDs, log levels)
    - Metrics collection (Prometheus-compatible or OpenTelemetry)
    - Distributed tracing enabled (trace IDs propagated across services)
    - Graceful shutdown (SIGTERM handling, connection draining)
    - Circuit breakers on external service calls
    - Retry logic with exponential backoff and jitter
    - Rate limiting on all public APIs
    - Input validation on ALL user inputs (never trust client)
    - Output encoding on ALL responses (prevent XSS, injection)
    - Error messages: User-friendly, no stack traces exposed
    - Database connection pooling configured
    - Cache eviction policies defined
    - Backup and recovery procedures documented
    - Disaster recovery plan documented
    - Runbooks for common operational tasks
    - On-call escalation procedures defined
  
