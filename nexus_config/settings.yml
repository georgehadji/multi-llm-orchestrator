# Nexus Search Configuration
# This is the SearXNG configuration file (branded as "Nexus Search")

use_default_settings: true

# General settings
general:
  debug: false
  instance_name: "Nexus Search"
  donation_url: null
  contact_url: null
  enable_metrics: true

# Search settings
search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "en"
  formats:
    - html
    - json

# Branding - IMPORTANT: Custom branding as "Nexus Search"
branding:
  instance_name: "Nexus Search"
  show_branding: false
  logo_path: null

# Query suggestions
query_in_title: false
results_on_new_tab: false

# Enabled engines (Nexus Sources)
engines:
  # Web Search
  - name: google
    engine: google
    shortcut: gl
    disabled: false
    
  - name: bing
    engine: bing
    shortcut: bi
    disabled: false
    
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
  
  # Academic Search
  - name: google scholar
    engine: google_scholar
    shortcut: sc
    disabled: false
    
  - name: arxiv
    engine: arxiv
    shortcut: ar
    disabled: false
    
  - name: pubmed
    engine: pubmed
    shortcut: pm
    disabled: false
  
  # Tech Search
  - name: github
    engine: github
    shortcut: gh
    disabled: false
    
  - name: stackoverflow
    engine: stackoverflow
    shortcut: so
    disabled: false
    
  - name: hackernews
    engine: hackernews
    shortcut: hn
    disabled: false
  
  # News Search
  - name: google news
    engine: google_news
    shortcut: gn
    disabled: false
    
  - name: bing news
    engine: bing_news
    shortcut: bn
    disabled: false
  
  # Code Search
  - name: github
    engine: github
    shortcut: gh
    disabled: true  # Already enabled above
    
  - name: stackoverflow
    engine: stackoverflow
    shortcut: so
    disabled: true  # Already enabled above

# Server settings
server:
  secret_key: "${SEARXNG_SECRET_KEY}"
  limiter: false
  image_proxy: false
  method: "POST"
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

# UI Settings
ui:
  static_use_hash: true
  default_theme: simple
  theme_args:
    simple_style: auto
  infinite_scroll: false
  center_alignment: false
  query_in_title: false
  results_on_new_tab: false

# Privacy settings
outgoing:
  request_timeout: 5.0
  max_request_timeout: 15.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 50
  enable_http2: true

# Logging
logging:
  level: WARNING
